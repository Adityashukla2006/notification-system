name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# A newer push makes an in-flight run obsolete; cancel it rather than pay for
# both. The default branch is exempt so its history keeps a result per commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  # Marks the run as CI, which turns a missing TEST_DATABASE_URL or
  # TEST_REDIS_ADDR from a skipped test into a failing one. Skipping the
  # integration tests here would report a green build that verified almost
  # nothing — worse than a red one, because it is believed.
  CI: "true"

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_password
          # A disposable database, mandatory: the store tests apply every
          # migration down then up, which drops the tables.
          POSTGRES_DB: notifications_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d notifications_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://app:app_password@localhost:5432/notifications_test?sslmode=disable
      TEST_REDIS_ADDR: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Verify formatting
        working-directory: api
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Build all binaries
        working-directory: api
        run: go build ./...

      # The race detector needs a working cgo toolchain, which the Linux runner
      # has and a stock Windows install often does not. This is the only place
      # the concurrent parts — the worker's promoter, heartbeat, reclaim, and
      # reap loops running alongside the delivery loop — get checked for races.
      - name: Test with the race detector
        working-directory: api
        run: go test -race -count=1 ./...

      - name: Confirm integration tests actually ran
        working-directory: api
        run: |
          skipped=$(go test -count=1 -v ./internal/store/ ./internal/queue/ ./internal/ratelimit/ 2>&1 | grep -c '^--- SKIP' || true)
          echo "skipped integration tests: $skipped"
          if [ "$skipped" -ne 0 ]; then
            echo "Integration tests were skipped in CI. They must run against the service containers."
            exit 1
          fi

      # A dedicated database, because "from scratch" has to mean it. The store
      # tests above build their schema by applying the migration SQL directly,
      # without recording a version — so running this against the same database
      # would find the tables already there, and migrate would correctly refuse
      # to create them again.
      - name: Verify migrations apply cleanly from scratch
        working-directory: api
        env:
          PGPASSWORD: app_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_password
          POSTGRES_DBNAME: migrate_check
          POSTGRES_SSLMODE: disable
          REDIS_ADDR: localhost:6379
        run: |
          psql -h localhost -U app -d postgres -c 'DROP DATABASE IF EXISTS migrate_check'
          psql -h localhost -U app -d postgres -c 'CREATE DATABASE migrate_check'

          go run ./cmd/migrate -status
          go run ./cmd/migrate
          # Applying twice must be a no-op, or a redeploy would fail.
          go run ./cmd/migrate
          go run ./cmd/migrate -status

  web:
    name: Dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # npm ci, not npm install: it installs exactly the lockfile and fails if
      # package.json and the lock have drifted, which is the point in CI.
      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      # No API_KEY needed: every data route renders per request, so nothing
      # calls the API at build time.
      - name: Build
        run: npm run build

  docker:
    name: Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Built but not pushed: this proves the Dockerfiles work on every change,
      # without needing registry credentials.
      - name: Build the API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build the dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
