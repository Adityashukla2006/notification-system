# Local development dependency: Redis (ephemeral coordination). The API and
# worker binaries run on the host against it. The healthcheck lets
# `docker compose up --wait` block until Redis is actually accepting
# connections.
#
# Postgres is deliberately NOT here: this machine runs a native Postgres on
# 5432. Publishing a container on the same port meant the native server
# silently won every host connection, and the resulting authentication
# failures pointed at the wrong server entirely.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # A local mail server that accepts everything and delivers nothing onward,
  # so email delivery can be exercised end to end without sending real mail to
  # real people. SMTP on 1025, web UI on http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 5
